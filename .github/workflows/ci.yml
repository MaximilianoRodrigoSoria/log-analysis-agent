name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  syntax:
    name: Chequeo de sintaxis (compileall)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m compileall -q -x "\.git" .
